<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>微信转账</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 封面页面 -->
    <div id="cover" class="page">
        <div class="cover-content">
            <div class="receipt-container">
                <div class="receipt-header">
                    <div class="checkmark">✓</div>
                </div>
                <div class="receipt-body">
                    <h2>你已收款</h2>
                    <div class="amount">¥ 10000.00</div>
                    <div class="divider"></div>
                    <div class="info-row">
                        <span>转账时间</span>
                        <span id="transferTime"></span>
                    </div>
                    <div class="info-row">
                        <span>收款时间</span>
                        <span id="receiveTime"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 第一个内部页面 -->
    <div id="page1" class="page hidden" onclick="goToPage2()">
        <div class="page-content warning-page">
            <div class="warning-text">愚人节快乐，谨防诈骗</div>
            <div class="image-container">
                <img id="page1Image" src="xixixi.jpg" alt="汐汐汐图片" style="cursor: pointer;">
            </div>
        </div>
    </div>

    <!-- 第二个内部页面 -->
    <div id="page2" class="page hidden" onclick="goBack()">
        <div class="page-content">
            <img id="page2Image" src="shengrikuaile.jpg" alt="生日快乐图片" style="cursor: pointer;">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>手机端小程序</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 封面页面 -->
    <div id="cover" class="page">
        <div class="cover-content">
            <img id="coverImage" src="6e8726426d4dd3907c1f503edee1e9a5.jpg" alt="收款截图">
            <input type="file" id="coverFile" accept="image/*" style="display: none;">
        </div>
    </div>

    <!-- 第一个内部页面 -->
    <div id="page1" class="page hidden" onclick="goToPage2()">
        <div class="page-content">
            <img id="page1Image" src="" alt="页面一图片" style="cursor: pointer;">
        </div>
    </div>

    <!-- 第二个内部页面 -->
    <div id="page2" class="page hidden" onclick="goBack()">
        <div class="page-content">
            <img id="page2Image" src="" alt="页面二图片" style="cursor: pointer;">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
